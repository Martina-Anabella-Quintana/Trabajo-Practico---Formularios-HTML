<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Turnos Médicos - UTN FRC</title>
    <style>
        :root {
            --primary-color: #0d9488;
            --primary-dark: #0f766e;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --border-ui: #e2e8f0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        form {
            background: #ffffff;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 16px;
            border: 1px solid var(--border-ui);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 30px;
            text-align: left;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 15px;
        }

        fieldset {
            border: none;
            padding: 0;
            margin: 0 0 30px 0;
        }

        legend {
            font-size: 1rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .campo {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="email"],
        input[type="tel"],
        input[type="date"],
